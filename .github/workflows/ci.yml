name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + type check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pyright

      - name: Lint (ruff)
        run: ruff check app/

      - name: Type check (pyright)
        run: pyright app/

  frontend:
    name: Frontend (lint + type check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  runner:
    name: Runner (Go vet + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: runner/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o ekos-runner .

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend, runner]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t observatory-backend website/backend

      - name: Build frontend image
        run: docker build -f website/frontend/Dockerfile.prod -t observatory-frontend website/frontend

      - name: Build runner image
        run: docker build -t ekos-runner runner
